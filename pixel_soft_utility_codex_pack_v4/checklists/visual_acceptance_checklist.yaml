visual_acceptance_checklist:
  schema_version: "1.1.0"
  result_required: "Codex must report pass/fail for every item before completion."

  app_shell:
    - id: "shell_uses_shared_structure"
      must_pass: true
      check: "App uses AppShell with shared background, max widths, safe-area bottom padding, toast/dialog hosts."
    - id: "main_width_and_spacing"
      must_pass: true
      check: "Mobile main content uses 16px outer padding and 12-16px card gaps; desktop uses 24px padding and dashboard spacing."

  header:
    - id: "shared_header"
      must_pass: true
      check: "Header uses AppLogo/AppSymbol + AppName + AppSubtitle + spacer + AvatarButton/overflow pattern."
    - id: "header_logo_container"
      must_pass: true
      check: "If app_logo exists, it appears in the shared 42px AppSymbol container without custom header styling."
    - id: "no_header_technical_noise"
      must_pass: true
      check: "No version/build/SHA/server/storage/download/CSV/sync/admin/status chip in header."
    - id: "sticky_safe_area"
      must_pass: true
      check: "Mobile header is sticky, safe-area-aware, translucent, and gains subtle surface/border when scrolled."

  logo_identity:
    - id: "logo_in_header"
      must_pass: true
      check: "If app_logo is provided, the logo appears in the header in the shared 42px AppSymbol container."
    - id: "favicon_from_logo"
      must_pass: true
      check: "Favicon uses app_logo.favicon or app_logo.src."
    - id: "logo_contextual_usage"
      must_pass: true
      check: "About/Profile/Empty-State use the logo where it improves orientation."
    - id: "logo_fallback"
      must_pass: true
      check: "Logo falls back to app_symbol when the logo asset fails to load."
    - id: "no_logo_theme_extraction"
      must_pass: true
      check: "No logo colors were turned into app-specific theme colors."
    - id: "shared_logo_container_style"
      must_pass: true
      check: "Header container, radius, padding, border and surface stay identical across apps despite different logos."

  theming:
    - id: "six_themes"
      must_pass: true
      check: "Theme picker exposes Lavender, Mint, Sky, Amber, Rose, Graphite."
    - id: "mode_support"
      must_pass: true
      check: "System, Light, Dark modes are supported and reflected by data-mode/data-resolved-mode."
    - id: "local_storage_keys"
      must_pass: true
      check: "Theme and mode persist using {app_id}-theme and {app_id}-mode."
    - id: "no_hardcoded_colors"
      must_pass: true
      check: "No component-local hardcoded colors outside tokens.css, except transparent/currentColor and rare utility constants."

  components:
    - id: "buttons"
      must_pass: true
      check: "Buttons are pill-shaped, 44px+ high, and use filled/tonal/outlined/text/danger variants."
    - id: "cards"
      must_pass: true
      check: "Cards use 24-38px radii, soft tonal surfaces, subtle borders, and sparse shadows."
    - id: "technical_cards"
      must_pass: true
      check: "TechnicalCard appears only inside About/Admin/Diagnostics/Logs and uses monospace only for technical values."
    - id: "sheets"
      must_pass: true
      check: "Profile/Settings/About/Admin use BottomSheet/CenterSheet on mobile and SideSheet/popover on desktop."
    - id: "bottom_navigation_rule"
      must_pass: true
      check: "BottomNavigation exists only if there are 3-5 real main sections."

  accessibility:
    - id: "touch_targets"
      must_pass: true
      check: "All interactive controls have at least 44px touch target."
    - id: "focus_states"
      must_pass: true
      check: "Keyboard focus states are visible and match component radius."
    - id: "aria_icon_buttons"
      must_pass: true
      check: "Every icon-only button has an aria-label."
    - id: "logo_alt_text"
      must_pass: true
      check: "Header logo has empty alt when app_name is visible; descriptive alt is used only when logo appears without adjacent text."
    - id: "reduced_motion"
      must_pass: true
      check: "prefers-reduced-motion is implemented."
    - id: "contrast"
      must_pass: true
      check: "Text and controls target WCAG AA in light/dark for all six themes."

  responsive:
    - id: "mobile_no_desktop_tables"
      must_pass: true
      check: "Desktop tables are transformed into cards/lists on mobile."
    - id: "desktop_no_mobile_bottom_nav"
      must_pass: true
      check: "Desktop does not use mobile bottom navigation."
    - id: "dashboard_density"
      must_pass: true
      check: "Desktop uses calm dashboard density: card grid, search/filter/table/list where useful."

  anti_patterns:
    - id: "no_loud_design"
      must_pass: true
      check: "No neon, heavy glassmorphism, excessive gradients, gaming UI, or marketing landing page layout."
    - id: "no_external_icon_cdn"
      must_pass: true
      check: "No remote Material Symbols/Icon CDN dependency for core icons."
    - id: "no_per_app_design_system"
      must_pass: true
      check: "App did not introduce app-specific accent colors, custom button styles, custom radii, or custom shadows."
