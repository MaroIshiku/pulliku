services:
  app:
    image: ghcr.io/OWNER/APP_NAME:latest
    container_name: APP_NAME
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: "Europe/Berlin"
      ISHIKU_APP_URL: "https://APP_NAME.example.local"
      ISHIKU_BASE_PATH: "/"
      ISHIKU_DATA_DIR: "/data"
      ISHIKU_LOG_LEVEL: "info"
      ISHIKU_SETUP_SECRET_FILE: "/run/secrets/ishiku_setup_secret"
      # Fallback only when Docker secrets are not available:
      # ISHIKU_SETUP_SECRET: "replace-with-a-long-random-setup-secret"
    volumes:
      - ./data:/data
    secrets:
      - ishiku_setup_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

secrets:
  ishiku_setup_secret:
    file: ./secrets/setup_secret.txt
