<!doctype html>
<html lang="de" data-theme="lavender" data-mode="system" data-resolved-mode="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFBFF" />
  <meta name="application-name" content="Pulliku" />
  <meta name="apple-mobile-web-app-title" content="Pulliku" />
  <title>Pulliku</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/logos/example-pulliku-logo.svg" />
  <link rel="stylesheet" href="../../design-system/components.css" />
</head>
<body>
  <div id="icon-sprite" aria-hidden="true"></div>

  <div class="psu-app-shell">
    <header class="psu-app-header" data-psu-app-header>
      <div class="psu-app-header__inner">
        <div class="psu-app-symbol" aria-hidden="true">
          <img data-psu-app-logo src="../../assets/logos/example-pulliku-logo.svg" alt="" />
          <svg data-psu-fallback-symbol><use href="#psu-icon-download"></use></svg>
        </div>
        <div class="psu-app-title-stack">
          <h1 class="psu-app-title" data-psu-app-name>Pulliku</h1>
          <p class="psu-app-subtitle" data-psu-app-subtitle>Medien herunterladen</p>
        </div>
        <div class="psu-spacer"></div>
        <button class="psu-avatar-button" type="button" aria-label="Profilmenü öffnen" data-psu-open="#profile-sheet">MM</button>
      </div>
    </header>

    <main class="psu-main">
      <section class="psu-hero-card">
        <h2 class="psu-card-title">Neuer Download</h2>
        <p class="psu-card-text">Füge eine URL ein und wähle die Einstellungen direkt im Kontext dieses Downloads.</p>
        <div class="psu-card-actions">
          <label class="psu-field" style="flex:1 1 100%">
            <span class="psu-label">URL</span>
            <input class="psu-input" placeholder="https://…" />
          </label>
          <button class="psu-button psu-button--filled" type="button">Download starten</button>
          <button class="psu-button psu-button--tonal" type="button">Einstellungen</button>
        </div>
      </section>

      <section class="psu-card">
        <h2 class="psu-card-title">Aktuelle Queue</h2>
        <p class="psu-card-text">Kontextstatus bleibt in Karten und nicht im Header.</p>
      </section>

      <section class="psu-tonal-card">
        <h2 class="psu-card-title">Darstellung</h2>
        <div class="psu-chip-group" role="group" aria-label="Theme wählen">
          <button class="psu-chip" data-theme-choice="lavender">Lavender</button>
          <button class="psu-chip" data-theme-choice="mint">Mint</button>
          <button class="psu-chip" data-theme-choice="sky">Sky</button>
          <button class="psu-chip" data-theme-choice="amber">Amber</button>
          <button class="psu-chip" data-theme-choice="rose">Rose</button>
          <button class="psu-chip" data-theme-choice="graphite">Graphite</button>
        </div>
      </section>
    </main>
  </div>

  <div class="psu-backdrop" id="profile-sheet" hidden>
    <section class="psu-center-sheet" role="dialog" aria-modal="true" aria-labelledby="profile-title">
      <header class="psu-sheet-header">
        <button class="psu-icon-button" type="button" aria-label="Profilmenü schließen" data-psu-close>
          <svg><use href="#psu-icon-close"></use></svg>
        </button>
        <h2 class="psu-sheet-title" id="profile-title" data-psu-app-name>Pulliku</h2>
        <span></span>
      </header>

      <div class="psu-account-card">
        <div class="psu-account-avatar">MM</div>
        <div>
          <p class="psu-account-name">Marlo</p>
          <p class="psu-account-id">Lokales Profil</p>
        </div>
      </div>

      <section class="psu-card" aria-label="App-Identität">
        <div style="display:flex; align-items:center; gap: var(--space-4);">
          <div class="psu-logo-frame" aria-hidden="true">
            <img data-psu-app-logo src="../../assets/logos/example-pulliku-logo.svg" alt="" />
            <svg data-psu-fallback-symbol><use href="#psu-icon-download"></use></svg>
          </div>
          <div>
            <h3 class="psu-card-title" data-psu-app-name>Pulliku</h3>
            <p class="psu-card-text" data-psu-app-subtitle>Medien herunterladen</p>
          </div>
        </div>
      </section>

      <div class="psu-list">
        <button class="psu-list-row" type="button"><svg class="psu-list-row__icon"><use href="#psu-icon-settings"></use></svg><span class="psu-list-row__label">Einstellungen</span><span></span></button>
        <button class="psu-list-row" type="button"><svg class="psu-list-row__icon"><use href="#psu-icon-palette"></use></svg><span class="psu-list-row__label">Darstellung</span><span></span></button>
        <button class="psu-list-row" type="button"><svg class="psu-list-row__icon"><use href="#psu-icon-info"></use></svg><span class="psu-list-row__label">Über diese App</span><span></span></button>
        <button class="psu-list-row" type="button"><svg class="psu-list-row__icon"><use href="#psu-icon-admin"></use></svg><span class="psu-list-row__label">Admin-Info</span><span></span></button>
      </div>
    </section>
  </div>

  <script type="application/json" data-psu-app-config>{"app_id":"pulliku","app_name":"Pulliku","app_subtitle":"Medien herunterladen","app_symbol":"download","app_logo":{"src":"../../assets/logos/example-pulliku-logo.svg","favicon":"../../assets/logos/example-pulliku-logo.svg","alt":"","use_as_header_symbol":true,"use_as_favicon":true,"use_as_about_symbol":true,"use_as_profile_sheet_symbol":true,"use_as_empty_state_symbol":true},"default_theme":"lavender","default_mode":"system"}</script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
