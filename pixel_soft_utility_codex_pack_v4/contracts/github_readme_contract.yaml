github_readme_contract:
  schema_version: "1.0.0"
  status: "canonical_for_all_public_ishiku_repositories"
  purpose: "Every GitHub README generated by Codex for an ishiku app must use the same structure, wording pattern, and section order."
  language: "de"

  required_order:
    - id: "title"
      heading: "# {app_name}"
      required: true
      content: "Short subtitle and optional logo."
    - id: "badges"
      heading: null
      required: false
      content: "Optional build/container/license badges. Keep calm and minimal."
    - id: "summary"
      heading: "## Kurzbeschreibung"
      required: true
    - id: "ishiku_family"
      heading: "## Teil der ishiku-Familie"
      required: true
      required_points:
        - "This app follows the shared Pixel Soft Utility design system."
        - "Mention calm, rounded, self-hosted utility UI."
        - "Mention shared themes and consistent setup behavior."
    - id: "features"
      heading: "## Funktionen"
      required: true
    - id: "screenshots"
      heading: "## Screenshots"
      required: false
      rule: "Use relative paths. Do not embed huge images."
    - id: "tech_stack"
      heading: "## Tech Stack"
      required: true
    - id: "installation"
      heading: "## Installation"
      required: true
      subsections:
        - "### Docker Compose"
        - "### Erstes Starten"
        - "### Adminaccount erstellen"
    - id: "configuration"
      heading: "## Konfiguration"
      required: true
      subsections:
        - "### Umgebungsvariablen"
        - "### Docker Secrets"
        - "### Persistente Daten"
    - id: "security"
      heading: "## Sicherheit"
      required: true
      required_points:
        - "Setup secret is only for first-run registration."
        - "Admin password must not match setup secret."
        - "Password hashes only, no plaintext passwords."
        - "Public registration closes after first admin."
    - id: "updates_backup"
      heading: "## Updates und Backup"
      required: true
    - id: "development"
      heading: "## Entwicklung"
      required: true
    - id: "codex_notice"
      heading: "## Erstellt mit ChatGPT Codex"
      required: true
      wording_rule: "Say that the project was created/implemented with assistance from ChatGPT Codex; do not imply Codex owns or maintains it."
    - id: "status_license"
      heading: "## Status und Lizenz"
      required: true

  writing_style:
    - "German by default."
    - "Calm, practical, not marketing-heavy."
    - "No exaggerated claims."
    - "No fake roadmap, badges, screenshots, or license if not present."
    - "Use placeholders like {OWNER}/{REPO} only in templates, not final README when values are known."
    - "Mention that the repository is public if relevant, but do not expose private secrets or deployment URLs."

  forbidden:
    - "Putting real secrets into README examples."
    - "Copying local absolute paths from the developer machine unless explicitly intended."
    - "Inconsistent section order between apps."
    - "App-specific design language claims that contradict Pixel Soft Utility."
    - "Claiming security guarantees that are not implemented."
