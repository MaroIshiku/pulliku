component_usage_matrix:
  schema_version: "1.1.0"
  rule: "Use these mappings instead of inventing local UI patterns."

  identity:
    app_identity: "AppHeader with AppLogo/AppSymbol, AppName, AppSubtitle, spacer, AvatarButton or overflow menu."
    app_logo: "User-provided logo in the shared 42px AppSymbol container. Use as primary identity when available."
    app_symbol: "Logical local icon fallback in 42px rounded container when logo is missing or fails to load."
    favicon: "Use app_logo.favicon or app_logo.src as favicon. Generate PNG/ICO only from the same logo if required."
    pwa_icon: "Use app_logo-derived PWA icons when the app has a webmanifest."
    profile_entry: "AvatarButton when user/account exists; otherwise IconButton with more_vert."

  placement:
    primary_action: "Button variant filled inside HeroCard, dashboard card, form footer, or contextual action area. Never permanent in header."
    secondary_action: "Button variant tonal or outlined in the same content context."
    destructive_action: "Button variant danger only after Dialog confirmation or in explicit danger zone."
    app_status: "HeroCard, dashboard card, contextual stats card, list section header, inline banner, or About/Admin. Never AppHeader."
    technical_info: "TechnicalCard inside About/Admin/Diagnostics/Logs sheet only. Never header or visible main footer."
    filters: "Chip group or SegmentedControl."
    short_tabs: "SegmentedControl for 2-4 nearby states."
    long_navigation_mobile: "BottomNavigation only for 3-5 true main sections."
    long_navigation_desktop: "NavigationRail only for complex apps."
    empty_state: "EmptyState card with icon, short title, helpful hint, and one optional primary action."
    progress: "Progress bar inside contextual card/list row, not header chip."
    toasts: "Non-blocking saved/copied/undo feedback at bottom above safe area."

  components:
    AppShell:
      required: true
      owns: ["background", "safe_area", "main_width", "page_gap", "toast_host", "dialog_host"]
    AppHeader:
      required: true
      owns: ["logo_or_symbol_identity", "top_level_menu_entry", "optional_search_or_notification"]
      forbidden: ["version", "build", "sha", "server", "storage", "download_count", "csv_status", "sync_status", "admin_badge"]
    ProfileSheet:
      required_when: "has_account=true"
      mobile: "CenterSheet preferred; BottomSheet acceptable."
      desktop: "Popover or right SideSheet."
    SettingsSheet:
      required: true
      contains: ["appearance", "theme_picker", "mode_picker", "about", "admin_info", "logs"]
    Button:
      variants: ["filled", "tonal", "outlined", "text", "danger"]
      min_height: "44px"
    Card:
      variants: ["Card", "HeroCard", "TonalCard", "TechnicalCard"]
      radii: "24px-38px via tokens"
    Inputs:
      components: ["TextField", "SearchField"]
      min_height: "48px"
    Sheet:
      variants: ["BottomSheet", "CenterSheet", "SideSheet"]
      close_behavior: ["close button", "Escape", "backdrop click"]
    Dialog:
      use_for: ["destructive confirmation", "focused decision"]
      avoid_for: ["large settings", "logs", "long forms"]

  logo_usage:
    header: "Render app_logo inside .psu-app-symbol. Keep the same container size, radius, border, padding, and tonal surface across all apps."
    favicon: "Set link rel icon from app_logo.favicon or app_logo.src. Do not create separate favicon artwork."
    about_sheet: "Show app_logo above or beside app_name in About. Keep technical version/build/SHA in TechnicalCards below."
    profile_sheet: "May show app_logo in the sheet title/account area when it helps orientation. Do not replace the user avatar."
    empty_state: "May use app_logo as small supporting identity if no better contextual icon exists."
    fallback: "If logo load fails, show app_symbol from psu-icons.svg."
    forbidden: "No logo-derived theme tokens, no custom header colors, no remote logo CDN, no large wordmark competing with app_name."

  six_theme_picker:
    mobile_pattern: "Use a 2x3 grid of theme buttons or a horizontally scrollable chip row. Six buttons are valid."
    labels: ["Lavender", "Mint", "Sky", "Amber", "Rose", "Graphite"]
    behavior: "Theme buttons update data-theme and persist {app_id}-theme. Mode buttons update data-mode and persist {app_id}-mode."


setup_and_auth_mapping:
  first_run_admin_registration:
    component: "RegisterWindow"
    presentation: "CenterSheet/Dialog-like setup window on tonal background"
    notes:
      - "Shown immediately when no admin exists."
      - "Blocking and not dismissible."
      - "Uses app_logo and same Pixel Soft Utility form components."
  setup_secret_field:
    component: "TextField password variant"
    location: "RegisterWindow only"
    forbidden: "Never in normal settings after setup is complete."
  admin_password_field:
    component: "TextField password variant with requirement list"
    validation: "Must differ from setup secret; min 12 chars; server-side enforcement required."
  setup_error:
    component: "TonalCard or TechnicalCard inside SetupErrorWindow"
    notes: "May name missing env var, never shows secret value."
  login:
    component: "AuthWindow"
    notes: "Same visual language as RegisterWindow, but public registration link is hidden after setup."
  readme_generation:
    template: "templates/github/README.template.md"
    contract: "contracts/github_readme_contract.yaml"
