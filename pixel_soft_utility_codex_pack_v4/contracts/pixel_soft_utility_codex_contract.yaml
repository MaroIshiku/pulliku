pixel_soft_utility_codex_contract:
  schema_version: "4.0.0"
  status: "canonical_for_codex_implementation"
  language: "de"
  purpose: "Make every ishiku/self-hosted web app look and behave like one shared design system."

  source_files:
    required_design_sources:
      - "pixel_design.yaml"
      - "ishiku_theme_standard.yaml"
      - "pixel_soft_utility_components_mobile.yaml"
      - "codex_prompt_mobile_components.txt"
    required_visual_references:
      - "palette.png"
      - "components.png"
      - "menu.png"
      - "mockup_mobile.png"
      - "mockup_desktop.png"
    conflict_resolution:
      - "Use this v4 contract as final Codex implementation contract."
      - "Use ishiku_theme_standard.yaml for six-theme color tokens."
      - "Use pixel_design.yaml for global principles, layouts, typography, shape, motion, accessibility, and anti-patterns."
      - "Use pixel_soft_utility_components_mobile.yaml for mobile AppHeader/ProfileSheet/component specifics."
      - "Use PNGs as visual anchors only, not as alternate specs."

  core_identity:
    design_system_name: "Pixel Soft Utility"
    suite_name: "ishiku"
    inspiration:
      - "Material 3 Expressive"
      - "Google Pixel UI"
      - "Immich-style calm self-hosted interface"
    keywords:
      - "calm"
      - "rounded"
      - "soft"
      - "clean"
      - "practical"
      - "self-hosted"
      - "mobile-app-like"
      - "desktop-dashboard-like"
      - "not loud"

  non_negotiable_rules:
    - "Do not redesign the visual language per app."
    - "Do not create app-specific brand systems, accent colors, radii, shadows, button styles, headers, or navigation patterns."
    - "Use the user-provided app logo as the primary identity symbol when available."
    - "Use app_symbol as a local icon fallback when app_logo is missing, fails to load, or is unsuitable for a tiny context."
    - "Do not derive app-specific theme colors from the logo; the six shared themes remain authoritative."
    - "Use CSS custom properties for all colors, spacing, shape, typography, shadows, and motion."
    - "Use the same six themes everywhere: lavender, mint, sky, amber, rose, graphite."
    - "Support system, light, and dark mode everywhere."
    - "Persist theme and mode per app with {app_id}-theme and {app_id}-mode."
    - "Do not place version/build date/GitHub SHA/server URL/storage/logs/diagnostics/admin info in AppHeader or main footer."
    - "Place technical info only in About/Admin Info/Diagnostics/Logs inside sheets."
    - "Do not place permanent primary actions in the header. Put them in content context."
    - "Mobile is single-column, app-like, safe-area-aware, with 44px+ touch targets."
    - "Desktop is a calm dashboard, not a marketing landing page."
    - "Use local/inline/self-hosted icons. No external icon CDN dependency."
    - "Visible focus states, keyboard navigation, text scaling, WCAG AA contrast, and prefers-reduced-motion support are required."
    - "Every account-based app must implement the universal first-run RegisterWindow for initial admin creation."
    - "The setup secret is required before the first admin can be created and must be validated server-side."
    - "The admin password must not equal the setup secret."
    - "Public registration closes immediately after the first admin account exists."
    - "Every public GitHub repository README must follow contracts/github_readme_contract.yaml and templates/github/README.template.md."

  logo_contract:
    primary_rule: "If app_logo is provided in the manifest, use it as the primary app identity asset."
    fallback_rule: "If the logo cannot load or is not provided, render app_symbol from the local icon set."
    required_placements:
      - "AppHeader symbol container"
      - "document favicon"
      - "PWA icons when the app has a webmanifest"
      - "ProfileSheet or account/settings header where useful"
      - "About sheet app identity area"
      - "Empty states or loading states when identity helps orientation"
    disallowed_behavior:
      - "Do not create a separate logo-specific header style."
      - "Do not extract a custom accent color from the logo."
      - "Do not place a large wordmark in the header when the app name is already shown as text."
      - "Do not use remote logo URLs by default."
    asset_rules:
      preferred_format: "SVG"
      accepted_formats: ["svg", "png", "webp", "ico"]
      light_dark_variants_allowed: true
      alt_text_rule: "Use empty alt in AppHeader when app_name is visible; use descriptive alt only when logo appears without adjacent text."

  theme_contract:
    themes: ["lavender", "mint", "sky", "amber", "rose", "graphite"]
    modes: ["system", "light", "dark"]
    default_theme: "lavender"
    default_mode: "system"
    dom_attributes:
      root: "document.documentElement"
      required: ["data-theme", "data-mode", "data-resolved-mode"]
    local_storage:
      theme_key: "{app_id}-theme"
      mode_key: "{app_id}-mode"
    theme_picker:
      mobile: "Six buttons as 2x3 grid or chips."
      desktop: "Six buttons/chips in Appearance sheet."

  setup_bootstrap_contract:
    required: true
    source_file: "contracts/setup_bootstrap_contract.yaml"
    first_run_behavior: "Show RegisterWindow immediately when no admin account exists."
    preferred_secret_source: "ISHIKU_SETUP_SECRET_FILE mounted to /run/secrets/ishiku_setup_secret"
    fallback_secret_source: "ISHIKU_SETUP_SECRET environment variable"

  github_readme_contract:
    required: true
    source_file: "contracts/github_readme_contract.yaml"
    template_file: "templates/github/README.template.md"
    rule: "Codex must generate README.md using the same section order for every ishiku app."

  required_code_files:
    - "design-system/tokens.css"
    - "design-system/base.css"
    - "design-system/components.css"
    - "design-system/theme-controller.js"
    - "design-system/app-shell.js"
    - "design-system/setup-flow.js"
    - "icons/psu-icons.svg"
    - "assets/logos/{app_id}.svg or equivalent user-provided logo asset"
    - "contracts/app.manifest.schema.yaml"
    - "contracts/component_usage_matrix.yaml"
    - "contracts/setup_bootstrap_contract.yaml"
    - "contracts/github_readme_contract.yaml"
    - "contracts/universal_app_runtime_contract.yaml"
    - "checklists/visual_acceptance_checklist.yaml"

  implementation_workflow_for_codex:
    - "Read app manifest or create one before UI work."
    - "Import or copy shared design-system files."
    - "Build AppShell first."
    - "Implement first-run setup using contracts/setup_bootstrap_contract.yaml before normal app access."
    - "Build AppHeader from shared component pattern and render app_logo inside the shared AppSymbol container when available."
    - "Map app content to shared components using component_usage_matrix.yaml."
    - "Wire theme-controller.js with app_id."
    - "Wire favicon/PWA/app identity metadata from app_logo without creating app-specific theme tokens."
    - "Implement Settings/Profile/About/Admin sheets."
    - "Generate or update README.md using templates/github/README.template.md and contracts/github_readme_contract.yaml."
    - "Remove hardcoded colors, radii, spacing, shadows, fonts, local header variants, and technical footer noise."
    - "Run visual_acceptance_checklist.yaml before finishing."
