setup_bootstrap_contract:
  schema_version: "1.0.0"
  status: "canonical_for_all_ishiku_apps"
  purpose: "Every ishiku app must use the same first-run setup, admin registration, and Docker secret behavior."
  language: "de"

  first_run_detection:
    setup_required_when:
      - "No admin account exists in the persistent app database."
      - "The setup state is missing, uninitialized, or explicitly reset by an admin maintenance command."
    setup_not_required_when:
      - "At least one admin account exists and setup_completed is true."
    fail_closed_conditions:
      - "No admin exists and no setup secret is configured."
      - "No persistent data directory is writable."
      - "Database initialization failed."
    fail_closed_ui:
      component: "SetupErrorWindow"
      message_rule: "Show a calm, non-technical explanation plus the exact missing configuration key. Do not expose secret values."

  docker_secret_contract:
    preferred_method: "Docker/Compose secret mounted as file"
    preferred_env:
      ISHIKU_SETUP_SECRET_FILE:
        default: "/run/secrets/ishiku_setup_secret"
        purpose: "Path to the mounted setup secret file."
    fallback_env:
      ISHIKU_SETUP_SECRET:
        purpose: "Fallback for simple docker run setups where mounted secrets are not available."
        warning: "Allowed for local/private deployments but less preferred because environment variables are easier to expose accidentally."
    rules:
      - "Server-side code must read the setup secret from ISHIKU_SETUP_SECRET_FILE first."
      - "If ISHIKU_SETUP_SECRET_FILE is set but unreadable, fail closed and show SetupErrorWindow."
      - "If no file secret exists, fallback to ISHIKU_SETUP_SECRET only when explicitly present."
      - "Never print the setup secret or its value length in logs."
      - "Never expose the setup secret to client-side JavaScript except as a user-entered form field."
      - "Never store the setup secret as the admin password."
      - "Do not persist the setup secret in the app database unless storing a non-reversible fingerprint is required for audit/debug; default is no persistence."

  register_window:
    component_name: "RegisterWindow"
    presentation:
      mobile: "CenterSheet-like full-screen safe-area modal if viewport is small; max-width card on larger mobile."
      desktop: "Centered rounded setup window on tonal background."
      visual_style: "Pixel Soft Utility: logo, calm surface, large radius, clear fields, no technical clutter."
    blocking: true
    dismissible: false
    route_examples:
      - "/setup"
      - "/register-admin"
    header:
      use_app_logo: true
      title: "Admin einrichten"
      subtitle: "Erstelle den ersten Adminaccount für diese ishiku App."
    fields:
      setup_secret:
        label: "Setup-Secret"
        type: "password"
        required: true
        autocomplete: "one-time-code"
        helper_text: "Steht in deinem Docker-Secret oder in ISHIKU_SETUP_SECRET."
      admin_display_name:
        label: "Anzeigename"
        required: true
        autocomplete: "name"
      admin_username:
        label: "Admin-Benutzername"
        required: true
        autocomplete: "username"
      admin_email:
        label: "E-Mail optional"
        required: false
        autocomplete: "email"
      admin_password:
        label: "Admin-Passwort"
        type: "password"
        required: true
        autocomplete: "new-password"
      admin_password_confirm:
        label: "Passwort wiederholen"
        type: "password"
        required: true
        autocomplete: "new-password"
    actions:
      primary: "Adminaccount erstellen"
      secondary: "Setup-Hilfe anzeigen"
    footer_note: "Nach dem Erstellen des Adminaccounts wird die Registrierung automatisch geschlossen."

  server_side_validation:
    required: true
    setup_secret_validation:
      - "Compare submitted setup_secret against configured secret server-side using timing-safe comparison when available."
      - "Reject empty, whitespace-only, or missing setup secret."
      - "Rate-limit failed setup attempts by IP/session/container instance."
      - "Audit failed and successful setup attempts without logging secret values."
    admin_password_validation:
      - "Admin password must not equal the setup secret."
      - "Admin password must not equal admin username, app name, or app_id."
      - "Minimum length: 12 characters."
      - "Reject known placeholder passwords such as changeme, admin, password, passwort, 123456, ishiku."
      - "Require confirmation match."
      - "Hash with a dedicated password hashing algorithm such as Argon2id where available, otherwise bcrypt/scrypt/PBKDF2 according to stack support."
      - "Never store plaintext passwords or reversible encrypted passwords."
    setup_completion:
      - "Create exactly one first admin during setup transaction."
      - "Mark setup_completed only after admin account creation succeeded."
      - "Disable public registration immediately after setup_completed."
      - "If setup is already complete, /setup must redirect to login or dashboard and never create another admin."

  shared_setup_states:
    unconfigured:
      trigger: "No admin exists and setup secret missing/unreadable."
      ui: "SetupErrorWindow"
    ready_to_register:
      trigger: "No admin exists and setup secret configured."
      ui: "RegisterWindow"
    registering:
      trigger: "Submit in progress."
      ui: "RegisterWindow with progress and disabled primary button."
    validation_error:
      trigger: "Invalid form or wrong setup secret."
      ui: "Inline field errors plus non-blocking message."
    completed:
      trigger: "Admin account created."
      ui: "Success toast, redirect to login/dashboard."

  accessibility:
    - "RegisterWindow must be keyboard navigable."
    - "Initial focus goes to setup_secret field."
    - "Errors are associated with fields via aria-describedby."
    - "Password requirements must not rely on color only."
    - "Buttons keep 44px minimum target."
    - "Reduced motion is respected."

  forbidden_patterns:
    - "Client-only setup-secret validation."
    - "Leaving admin registration open after first account creation."
    - "Using setup secret as permanent admin password."
    - "Logging secrets or plaintext passwords."
    - "Putting setup status in the normal AppHeader."
    - "Creating a separate visual design for setup screens."
    - "Using a remote font/icon CDN for setup UI."
