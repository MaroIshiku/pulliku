app_manifest_schema:
  schema_version: "1.2.0"
  purpose: "Per-app identity, logo assets, and behavior configuration for Pixel Soft Utility apps. This prevents Codex from inventing app-specific design language."

  required_fields:
    app_id:
      type: "kebab_or_lowercase_id"
      examples: ["pulliku", "meiku", "keyku", "libiku", "nestiku", "seediku"]
      rule: "Stable ID used for localStorage keys: {app_id}-theme and {app_id}-mode. Also used for PWA icon filenames when applicable."
    app_name:
      type: "string"
      rule: "Visible title in AppHeader, ProfileSheet, About sheet, document title, and app metadata."
    app_subtitle:
      type: "short_string"
      max_recommended_length_mobile: 28
      rule: "Human readable function description, not technical state."
    app_symbol:
      type: "logical_icon_name"
      rule: "Fallback symbol from local icon set. Used only if app_logo is unavailable or not appropriate in a specific tiny UI context."
    primary_purpose:
      type: "short_string"
      rule: "One sentence describing what the app does."
    main_sections:
      type: "array"
      rule: "Use BottomNavigation only when this contains 3 to 5 true top-level sections."

  recommended_fields:
    app_logo:
      type: "object"
      purpose: "Primary app identity asset. Use the user's provided logo in header, favicon, PWA icons, About sheet, ProfileSheet, empty states, and loading states where useful."
      fields:
        src:
          type: "path"
          examples: ["assets/logos/pulliku.svg", "assets/logos/meiku.png"]
          rule: "Default logo path. Prefer SVG. Relative to app root unless the stack requires import handling."
        light_src:
          type: "path"
          optional: true
          rule: "Optional light-mode optimized logo. Use only when the default logo is not readable on light surfaces."
        dark_src:
          type: "path"
          optional: true
          rule: "Optional dark-mode optimized logo. Use only when the default logo is not readable on dark surfaces."
        favicon:
          type: "path"
          optional: true
          rule: "Favicon source. Prefer SVG if accepted by the app/browser target; otherwise generate ico/png from the same logo."
        pwa_icon_192:
          type: "path"
          optional: true
          rule: "192x192 PWA icon generated from the same logo."
        pwa_icon_512:
          type: "path"
          optional: true
          rule: "512x512 PWA icon generated from the same logo."
        pwa_maskable_512:
          type: "path"
          optional: true
          rule: "512x512 maskable PWA icon generated from the same logo with safe area."
        alt:
          type: "string"
          default: ""
          rule: "Usually empty in AppHeader because app_name is visible next to it. Use descriptive alt only where the logo appears without adjacent text."
        use_as_header_symbol:
          type: "boolean"
          default: true
        use_as_favicon:
          type: "boolean"
          default: true
        use_as_pwa_icon:
          type: "boolean"
          default: true
        use_as_about_symbol:
          type: "boolean"
          default: true
        use_as_profile_sheet_symbol:
          type: "boolean"
          default: true
        use_as_empty_state_symbol:
          type: "boolean"
          default: true
      rules:
        - "Logo is the primary app symbol when provided."
        - "Logo must render inside the shared AppSymbol container, not with custom per-app header styling."
        - "Logo may be used for favicon and PWA icons."
        - "Logo colors must not become app-specific theme tokens."
        - "If logo fails to load, fall back to app_symbol from the local icon set."
        - "Do not use a remote logo URL unless the project explicitly requires it; prefer local assets."

  optional_fields:

    first_run_setup:
      type: "object"
      purpose: "Controls the universal first-run admin registration flow."
      fields:
        enabled:
          type: "boolean"
          default: true
          rule: "All account-based ishiku apps should enable this unless the app is intentionally static/no-auth."
        route:
          type: "string"
          default: "/setup"
        require_setup_secret:
          type: "boolean"
          default: true
        setup_secret_file_env:
          type: "string"
          default: "ISHIKU_SETUP_SECRET_FILE"
        setup_secret_env:
          type: "string"
          default: "ISHIKU_SETUP_SECRET"
        setup_secret_file_default:
          type: "string"
          default: "/run/secrets/ishiku_setup_secret"
        public_registration_after_first_admin:
          type: "boolean"
          default: false
        admin_password_must_differ_from_setup_secret:
          type: "boolean"
          default: true
        minimum_admin_password_length:
          type: "integer"
          default: 12
      rules:
        - "Setup secret validation is server-side only."
        - "RegisterWindow is shown only when no admin exists."
        - "Registration closes permanently after the first admin is created."
        - "Admin password must not equal setup secret."

    readme_profile:
      type: "object"
      purpose: "Metadata for generating the standardized GitHub README."
      fields:
        repository_name:
          type: "string"
        github_owner:
          type: "string"
          optional: true
        public_repository:
          type: "boolean"
          default: true
        short_description:
          type: "string"
        docker_image:
          type: "string"
          optional: true
        license:
          type: "string"
          optional: true
        codex_notice_enabled:
          type: "boolean"
          default: true

    default_theme:
      type: "enum"
      allowed: ["lavender", "mint", "sky", "amber", "rose", "graphite"]
      default: "lavender"
    default_mode:
      type: "enum"
      allowed: ["system", "light", "dark"]
      default: "system"
    has_account:
      type: "boolean"
      default: true
      rule: "If false, use overflow menu instead of avatar profile identity."
    user_identity_fields:
      type: "array"
      allowed: ["avatar", "initials", "display_name", "email", "username"]
    contextual_status:
      type: "array"
      rule: "Status may appear in HeroCards, DashboardCards, list headers, or ProfileSheet status card, never in AppHeader."
    primary_actions:
      type: "array"
      rule: "Actions must be placed in context cards, not permanently in the header."
    technical_info:
      type: "object"
      allowed_locations: ["About", "Admin Info", "Diagnostics", "Logs"]
      disallowed_locations: ["AppHeader", "main footer"]
    navigation_complexity:
      type: "enum"
      allowed: ["single_view", "few_sections", "complex"]
      rule: "single_view: no bottom nav; few_sections: segmented control or bottom nav if 3-5 sections; complex: desktop nav rail allowed."

  forbidden_fields:
    app_brand_color: "Do not define. Theme system is shared."
    logo_extracted_theme_color: "Do not define. Do not derive theme tokens from logo colors."
    custom_radius_scale: "Do not define. Use central shape tokens."
    custom_button_style: "Do not define. Use central Button variants."
    custom_header_style: "Do not define. Use AppHeader."
    remote_icon_cdn: "Do not define. Icons must be local/inline/self-hosted."
    public_registration_enabled_by_default: "Do not define. First admin setup closes registration after setup."
    admin_default_password: "Do not define. Admin password must be user-created during first-run setup."
