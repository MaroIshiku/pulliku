universal_app_runtime_contract:
  schema_version: "1.0.0"
  status: "recommended_for_all_ishiku_apps"
  purpose: "Shared runtime conventions that make all apps feel operationally related, not only visually related."

  standard_environment:
    required_or_recommended:
      TZ:
        default: "Europe/Berlin"
        purpose: "Consistent timestamps in UI and logs."
      ISHIKU_APP_URL:
        purpose: "Public base URL behind reverse proxy; used for links and metadata."
      ISHIKU_BASE_PATH:
        default: "/"
        purpose: "Optional sub-path hosting behind a reverse proxy."
      ISHIKU_DATA_DIR:
        default: "/data"
        purpose: "Persistent app data root."
      ISHIKU_LOG_LEVEL:
        default: "info"
        allowed: ["debug", "info", "warn", "error"]
      ISHIKU_TRUST_PROXY:
        default: "false"
        purpose: "Enable when behind a trusted reverse proxy."
      ISHIKU_SETUP_SECRET_FILE:
        default: "/run/secrets/ishiku_setup_secret"
      ISHIKU_SETUP_SECRET:
        purpose: "Fallback only. Prefer mounted secret file."

  standard_paths:
    data: "/data"
    database: "/data/app.db or stack-specific equivalent"
    uploads: "/data/uploads"
    exports: "/data/exports"
    logs: "/data/logs"
    cache: "/data/cache"
    config: "/data/config"

  standard_endpoints:
    healthz:
      path: "/healthz"
      purpose: "Liveness check. Must not require auth and must not expose sensitive data."
    readyz:
      path: "/readyz"
      purpose: "Readiness check. May check database and required config without exposing secrets."
    setup:
      path: "/setup"
      purpose: "First-run admin registration only. Redirects after setup is complete."
    login:
      path: "/login"
    logout:
      path: "/logout"
    admin:
      path: "/admin"
      rule: "Only visible to admin accounts."

  shared_auth_behavior:
    - "Same login visual structure across apps."
    - "Same first-run RegisterWindow across apps."
    - "Same logout confirmation behavior across apps."
    - "Same password change pattern in ProfileSheet/Settings."
    - "Sessions use HttpOnly cookies when cookies are used."
    - "Use SameSite=Lax or stricter unless the app has a documented reason."
    - "Account recovery is disabled unless SMTP or another recovery channel is explicitly configured."

  shared_admin_info:
    required_cards:
      - "App version"
      - "Build date"
      - "GitHub SHA if available"
      - "Data directory"
      - "Database status"
      - "Setup state"
      - "Health status"
      - "Log level"
    actions:
      - "Copy debug details"
      - "Open logs if implemented"
      - "Export backup if implemented"
    forbidden:
      - "Secret values"
      - "Plaintext passwords"
      - "Full session tokens"

  shared_feedback:
    loading: "Skeletons or calm progress indicators, no spinners everywhere."
    success: "Toast with optional Undo when safe."
    error: "Inline errors for forms, calm error cards for page-level issues."
    destructive_actions: "Require Dialog confirmation."
    empty_states: "Use shared EmptyState component with logo/icon, short title, one helpful action."

  github_repository_conventions:
    recommended_files:
      - "README.md from templates/github/README.template.md"
      - ".env.example"
      - "docker-compose.example.yml"
      - "CHANGELOG.md when releases begin"
      - "LICENSE if the project is intended to be reusable"
      - ".github/dependabot.yml if dependency updates should be tracked"
    do_not_commit:
      - ".env with real values"
      - "secrets/*.txt"
      - "/data"
      - "database files"
      - "logs"
      - "local uploads/exports unless intentional fixtures"
