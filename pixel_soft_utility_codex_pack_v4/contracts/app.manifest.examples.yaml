app_manifest_examples:
  schema_version: "1.2.0"
  note: "Examples for the ishiku app family. Replace paths and repository metadata with real app values."

  shared_defaults:
    default_theme: "lavender"
    default_mode: "system"
    has_account: true
    first_run_setup:
      enabled: true
      route: "/setup"
      require_setup_secret: true
      setup_secret_file_env: "ISHIKU_SETUP_SECRET_FILE"
      setup_secret_env: "ISHIKU_SETUP_SECRET"
      setup_secret_file_default: "/run/secrets/ishiku_setup_secret"
      public_registration_after_first_admin: false
      admin_password_must_differ_from_setup_secret: true
      minimum_admin_password_length: 12

  apps:
    pulliku:
      app_id: "pulliku"
      app_name: "Pulliku"
      app_subtitle: "Medien herunterladen"
      primary_purpose: "Self-hosted Webinterface für yt-dlp Downloads."
      app_symbol: "download"
      app_logo:
        src: "assets/logos/pulliku.svg"
        favicon: "assets/logos/pulliku.svg"
        pwa_icon_192: "assets/pwa/pulliku-192.png"
        pwa_icon_512: "assets/pwa/pulliku-512.png"
        pwa_maskable_512: "assets/pwa/pulliku-maskable-512.png"
        alt: ""
        use_as_header_symbol: true
        use_as_favicon: true
        use_as_pwa_icon: true
        use_as_about_symbol: true
        use_as_profile_sheet_symbol: true
        use_as_empty_state_symbol: true
      main_sections:
        - { id: "download", label: "Download", icon: "download" }
        - { id: "queue", label: "Queue", icon: "pending" }
        - { id: "history", label: "Verlauf", icon: "history" }
      contextual_status: ["active_downloads", "queued_downloads", "finished_downloads", "failed_jobs"]
      first_run_setup:
        enabled: true
        route: "/setup"
        require_setup_secret: true
        setup_secret_file_env: "ISHIKU_SETUP_SECRET_FILE"
        setup_secret_env: "ISHIKU_SETUP_SECRET"
        setup_secret_file_default: "/run/secrets/ishiku_setup_secret"
        public_registration_after_first_admin: false
        admin_password_must_differ_from_setup_secret: true
        minimum_admin_password_length: 12
      readme_profile:
        repository_name: "pulliku"
        public_repository: true
        short_description: "Pulliku ist ein ruhiges, self-hosted Webinterface für Medien-Downloads."
        docker_image: "ghcr.io/{OWNER}/pulliku:latest"
        codex_notice_enabled: true

    meiku:
      app_id: "meiku"
      app_name: "Meiku"
      app_subtitle: "Profil und QR-Karten"
      primary_purpose: "Teilt persönliche und geschäftliche Kontaktdaten mit QR- und Profilkarten."
      app_symbol: "badge"
      app_logo:
        src: "assets/logos/meiku.svg"
        favicon: "assets/logos/meiku.svg"
        alt: ""
        use_as_header_symbol: true
        use_as_favicon: true
        use_as_pwa_icon: true
        use_as_about_symbol: true
        use_as_profile_sheet_symbol: true
        use_as_empty_state_symbol: true
      main_sections:
        - { id: "profile", label: "Profil", icon: "account_circle" }
        - { id: "qr", label: "QR", icon: "qr_code" }
        - { id: "settings", label: "Einstellungen", icon: "settings" }
      first_run_setup:
        enabled: true
        route: "/setup"
        require_setup_secret: true
        public_registration_after_first_admin: false
        admin_password_must_differ_from_setup_secret: true
        minimum_admin_password_length: 12
      readme_profile:
        repository_name: "meiku"
        public_repository: true
        short_description: "Meiku ist eine self-hosted Profil- und Kontaktkarten-App im ishiku Designsystem."
        docker_image: "ghcr.io/{OWNER}/meiku:latest"
        codex_notice_enabled: true

    keyku:
      app_id: "keyku"
      app_name: "Keyku"
      app_subtitle: "Key-Datenbank"
      primary_purpose: "Verwaltet Steam- und Lizenzkeys in einer ruhigen, durchsuchbaren Oberfläche."
      app_symbol: "key"
      app_logo: { src: "assets/logos/keyku.svg", favicon: "assets/logos/keyku.svg", alt: "", use_as_header_symbol: true, use_as_favicon: true, use_as_pwa_icon: true, use_as_about_symbol: true, use_as_profile_sheet_symbol: true, use_as_empty_state_symbol: true }
      main_sections:
        - { id: "keys", label: "Keys", icon: "key" }
        - { id: "import", label: "Import", icon: "upload" }
        - { id: "history", label: "Verlauf", icon: "history" }
      contextual_status: ["unused_keys_count", "csv_last_loaded", "shared_count", "redeemed_count"]
      first_run_setup: { enabled: true, route: "/setup", require_setup_secret: true, public_registration_after_first_admin: false, admin_password_must_differ_from_setup_secret: true, minimum_admin_password_length: 12 }
      readme_profile: { repository_name: "keyku", public_repository: true, short_description: "Keyku ist eine self-hosted Key-Datenbank im ishiku Designsystem.", docker_image: "ghcr.io/{OWNER}/keyku:latest", codex_notice_enabled: true }

    libiku:
      app_id: "libiku"
      app_name: "Libiku"
      app_subtitle: "Audiobook Library"
      primary_purpose: "Ruhige Weboberfläche für Libation-nahe Bibliotheks- und Downloadabläufe."
      app_symbol: "library_books"
      app_logo: { src: "assets/logos/libiku.svg", favicon: "assets/logos/libiku.svg", alt: "", use_as_header_symbol: true, use_as_favicon: true, use_as_pwa_icon: true, use_as_about_symbol: true, use_as_profile_sheet_symbol: true, use_as_empty_state_symbol: true }
      main_sections:
        - { id: "library", label: "Bibliothek", icon: "library_books" }
        - { id: "downloads", label: "Downloads", icon: "download" }
        - { id: "sync", label: "Sync", icon: "sync" }
      contextual_status: ["library_count", "active_downloads", "missing_items", "last_sync"]
      first_run_setup: { enabled: true, route: "/setup", require_setup_secret: true, public_registration_after_first_admin: false, admin_password_must_differ_from_setup_secret: true, minimum_admin_password_length: 12 }
      readme_profile: { repository_name: "libiku", public_repository: true, short_description: "Libiku ist eine self-hosted Audiobook-Library-App im ishiku Designsystem.", docker_image: "ghcr.io/{OWNER}/libiku:latest", codex_notice_enabled: true }

    nestiku:
      app_id: "nestiku"
      app_name: "Nestiku"
      app_subtitle: "Startpage"
      primary_purpose: "Startpage mit Suche, Favoriten und gespeicherten Einstellungen."
      app_symbol: "home"
      app_logo: { src: "assets/logos/nestiku.svg", favicon: "assets/logos/nestiku.svg", alt: "", use_as_header_symbol: true, use_as_favicon: true, use_as_pwa_icon: true, use_as_about_symbol: true, use_as_profile_sheet_symbol: true, use_as_empty_state_symbol: true }
      main_sections:
        - { id: "home", label: "Start", icon: "home" }
        - { id: "links", label: "Links", icon: "link" }
        - { id: "settings", label: "Einstellungen", icon: "settings" }
      first_run_setup: { enabled: true, route: "/setup", require_setup_secret: true, public_registration_after_first_admin: false, admin_password_must_differ_from_setup_secret: true, minimum_admin_password_length: 12 }
      readme_profile: { repository_name: "nestiku", public_repository: true, short_description: "Nestiku ist eine self-hosted Startpage im ishiku Designsystem.", docker_image: "ghcr.io/{OWNER}/nestiku:latest", codex_notice_enabled: true }

    seediku:
      app_id: "seediku"
      app_name: "Seediku"
      app_subtitle: "Torrent Loader"
      primary_purpose: "Self-hosted Oberfläche zum Hinzufügen und Überwachen von Torrent-Aufgaben."
      app_symbol: "cloud_download"
      app_logo: { src: "assets/logos/seediku.svg", favicon: "assets/logos/seediku.svg", alt: "", use_as_header_symbol: true, use_as_favicon: true, use_as_pwa_icon: true, use_as_about_symbol: true, use_as_profile_sheet_symbol: true, use_as_empty_state_symbol: true }
      main_sections:
        - { id: "add", label: "Hinzufügen", icon: "add" }
        - { id: "queue", label: "Queue", icon: "pending" }
        - { id: "history", label: "Verlauf", icon: "history" }
      contextual_status: ["active_jobs", "queued_jobs", "finished_jobs", "failed_jobs"]
      first_run_setup: { enabled: true, route: "/setup", require_setup_secret: true, public_registration_after_first_admin: false, admin_password_must_differ_from_setup_secret: true, minimum_admin_password_length: 12 }
      readme_profile: { repository_name: "seediku", public_repository: true, short_description: "Seediku ist ein self-hosted Torrent Loader im ishiku Designsystem.", docker_image: "ghcr.io/{OWNER}/seediku:latest", codex_notice_enabled: true }
