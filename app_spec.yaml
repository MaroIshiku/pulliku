app_spec:
  schema_version: "1.0.0"

  metadata:
    app_id: "pulliku"
    app_name: "Pulliku"
    app_family: "ishiku"
    app_type: "self_hosted_web_app"
    repository_name: "pulliku"
    language: "en"
    spec_status: "draft"
    last_reviewed: "2026-06-30"
    app_source_directory: "repo"
    repository_root_purpose: "Project-level metadata, design assets, specifications, and GitHub repository files."

  identity:
    short_description: "A calm, self-hosted web interface for media downloads."
    long_description: "Pulliku is a self-hosted media download interface built with FastAPI, static HTML/CSS/JavaScript, yt-dlp, ffmpeg, Deno, and yt-dlp-ejs. It is designed for private or small personal deployments and follows the shared Pixel Soft Utility design system."
    primary_purpose: "Queue, download, manage, open, retain, and delete media files through an authenticated local web interface."
    target_users:
      - "admin"
      - "local_user"
    use_case_summary:
      - "Create a local admin account during first-run setup."
      - "Add media URLs to a download queue."
      - "Download video or audio files with selected format options."
      - "Open completed files inline from the server."
      - "Delete completed files from both UI and server storage."
      - "Keep selected completed files permanently instead of automatic cleanup."
    not_a_brand: true
    app_symbol:
      preferred_icon_concept: "download"
      current_logo_file: "repo/app/static/pulliku-logo.png"
      forbidden_logo_usage:
        - "do_not_create_separate_brand_identity"
        - "do_not_replace_shared_ishiku_design_language_with_app_specific_branding"

  repository_structure:
    root_directory:
      purpose: "Repository-level project information and shared design/specification assets."
      expected_files:
        - "app_spec.yaml"
        - "pixel_soft_utility_codex_pack_v4/"
        - ".github/"
      app_code_location: "repo/"
    app_directory:
      path: "repo/"
      purpose: "Runnable Pulliku application, Docker files, app README, requirements, and source code."
      contains_gitignored_runtime_data:
        - "repo/data/"
        - "repo/downloads/"
        - "repo/secrets/"

  scope:
    included:
      - "Authenticated first-run setup and login."
      - "Admin user management."
      - "User-scoped download queue."
      - "Video, audio, captions, thumbnail, and playlist option handling."
      - "Completed file download."
      - "Completed file inline open endpoint."
      - "Manual file deletion from UI and server storage."
      - "Automatic retention cleanup for completed non-permanent files."
      - "Permanent/no-expiration toggle for completed files."
      - "Theme and appearance settings."
      - "About, diagnostics, and health information."
    excluded:
      - "Public unauthenticated download sharing."
      - "Multi-tenant organization management."
      - "Cloud storage synchronization."
      - "External OAuth login."
      - "Payment or subscription features."
    non_goals:
      - "Acting as a general-purpose file manager."
      - "Creating a separate visual identity outside the ishiku family."
      - "Guaranteeing availability of third-party media platforms."
    future_possible_extensions:
      - "Optional scheduled downloads."
      - "Optional retention policy per user or per media type."
      - "Optional queue priority controls."
      - "Optional download log export."

  core_capabilities:
    - id: "first_run_setup"
      name: "First-run admin setup"
      description: "Registers the first administrator when no admin exists, guarded by a setup secret."
      priority: "must"
      user_visible: true
      requires_auth: false
      status: "implemented"
      inputs:
        - name: "setup_secret"
          type: "string"
          required: true
          validation: "Must match ISHIKU_SETUP_SECRET or the configured setup secret file."
        - name: "username"
          type: "string"
          required: true
          validation: "3 to 80 characters."
        - name: "password"
          type: "string"
          required: true
          validation: "At least 12 characters, three character classes, not equal to setup secret, username, app id, app name, or common placeholder passwords."
      outputs:
        - name: "admin_user"
          type: "object"
          description: "Created local administrator account."
      failure_modes:
        - id: "invalid_setup_secret"
          message: "Invalid setup secret"
          recovery: "Use the configured setup secret from environment or secret file."
        - id: "weak_password"
          message: "Password does not meet requirements"
          recovery: "Choose a stronger password."
    - id: "local_login"
      name: "Local password login"
      description: "Authenticates users with local username and password credentials."
      priority: "must"
      user_visible: true
      requires_auth: false
      status: "implemented"
      inputs:
        - name: "username"
          type: "string"
          required: true
          validation: "Required."
        - name: "password"
          type: "string"
          required: true
          validation: "Required."
      outputs:
        - name: "session_cookie"
          type: "http_only_cookie"
          description: "Authenticated session cookie."
        - name: "csrf_cookie"
          type: "cookie"
          description: "CSRF token cookie for unsafe requests."
      failure_modes:
        - id: "invalid_credentials"
          message: "Invalid credentials"
          recovery: "Retry with valid local credentials."
        - id: "rate_limited"
          message: "Too many attempts"
          recovery: "Wait for the configured rate-limit window."
    - id: "create_download"
      name: "Create download"
      description: "Adds a media URL and options to the user-scoped queue."
      priority: "must"
      user_visible: true
      requires_auth: true
      status: "implemented"
      inputs:
        - name: "url"
          type: "string"
          required: true
          validation: "8 to 4096 characters."
        - name: "media_type"
          type: "enum"
          required: true
          validation: "auto, video, audio, captions, or thumbnail."
        - name: "playlist"
          type: "boolean"
          required: false
          validation: null
      outputs:
        - name: "download"
          type: "object"
          description: "Created queued download item."
      failure_modes:
        - id: "invalid_url"
          message: "Request validation failed"
          recovery: "Enter a valid media URL."
    - id: "process_download_queue"
      name: "Process download queue"
      description: "Background worker claims queued items and runs yt-dlp with the selected options."
      priority: "must"
      user_visible: true
      requires_auth: true
      status: "implemented"
      inputs:
        - name: "queued_download"
          type: "database_record"
          required: true
          validation: "status equals queued."
      outputs:
        - name: "completed_file"
          type: "file"
          description: "Downloaded or packaged media file in DOWNLOAD_DIR."
      failure_modes:
        - id: "yt_dlp_error"
          message: "Download failed"
          recovery: "Check source URL, network availability, and diagnostics."
    - id: "download_file"
      name: "Download completed file"
      description: "Streams a completed file with attachment content disposition."
      priority: "must"
      user_visible: true
      requires_auth: true
      status: "implemented"
      inputs:
        - name: "download_id"
          type: "integer"
          required: true
          validation: "Must belong to current user and reference a completed item with a file."
      outputs:
        - name: "file_response"
          type: "http_file"
          description: "Completed file as a browser download."
      failure_modes:
        - id: "file_not_found"
          message: "File not found"
          recovery: "Verify the file still exists and has not expired or been deleted."
    - id: "open_file"
      name: "Open completed file"
      description: "Streams a completed file inline from the server when the browser can render it."
      priority: "should"
      user_visible: true
      requires_auth: true
      status: "implemented"
      inputs:
        - name: "download_id"
          type: "integer"
          required: true
          validation: "Must belong to current user and reference a completed item with a file."
      outputs:
        - name: "inline_file_response"
          type: "http_file"
          description: "Completed file with inline content disposition."
      failure_modes:
        - id: "browser_cannot_render"
          message: "Browser downloads or cannot display the file"
          recovery: "Use the download action instead."
    - id: "delete_file"
      name: "Delete file"
      description: "Deletes a completed, failed, cancelled, or queued download record and removes the local file when present."
      priority: "must"
      user_visible: true
      requires_auth: true
      status: "implemented"
      inputs:
        - name: "download_id"
          type: "integer"
          required: true
          validation: "Must belong to current user."
      outputs:
        - name: "status"
          type: "string"
          description: "Deletion status."
      failure_modes:
        - id: "running_download"
          message: "Cancel running downloads before deleting them"
          recovery: "Cancel or wait for completion before deleting."
    - id: "retention_cleanup"
      name: "Retention cleanup"
      description: "Automatically deletes completed non-permanent files after the configured retention period."
      priority: "must"
      user_visible: true
      requires_auth: false
      status: "implemented"
      inputs:
        - name: "PULLIKU_FILE_RETENTION_DAYS"
          type: "integer"
          required: false
          validation: "0 disables retention; positive values define days."
      outputs:
        - name: "deleted_downloads"
          type: "integer"
          description: "Number of expired files removed by cleanup."
      failure_modes:
        - id: "filesystem_error"
          message: "Cleanup skipped a file"
          recovery: "Check file permissions and mounted download directory."

  user_roles:
    - id: "admin"
      name: "Admin"
      description: "Primary local administrator."
      permissions:
        - "create_download"
        - "view_own_downloads"
        - "cancel_own_downloads"
        - "delete_own_downloads"
        - "toggle_own_download_retention"
        - "download_own_files"
        - "open_own_files"
        - "manage_users"
        - "view_diagnostics"
    - id: "local_user"
      name: "Local User"
      description: "Authenticated non-admin local account."
      permissions:
        - "create_download"
        - "view_own_downloads"
        - "cancel_own_downloads"
        - "delete_own_downloads"
        - "toggle_own_download_retention"
        - "download_own_files"
        - "open_own_files"

  authentication:
    required: true
    registration_flow:
      first_start_requires_admin_registration: true
      requires_docker_secret: false
      docker_secret_variable_name: "ISHIKU_SETUP_SECRET_FILE"
      env_secret_variable_name: "ISHIKU_SETUP_SECRET"
      admin_password_must_differ_from_registration_secret: true
      public_registration_after_first_admin: false
    login_methods:
      - "local_password"
    session_handling:
      type: "http_only_cookie_with_csrf_cookie"
      details:
        session_cookie_name: "pulliku_session"
        secure_session_cookie_name: "__Host-pulliku-session"
        csrf_cookie_name: "pulliku_csrf"
        same_site_default: "strict"
        secure_cookie_env: "APP_COOKIE_SECURE"
        session_days_env: "SESSION_DAYS"
        session_days_default: 14
    password_rules:
      min_length: 12
      must_not_equal_registration_secret: true
      must_use_three_character_classes: true
      blocked_common_values:
        - "admin"
        - "password"
        - "passwort"
        - "changeme"
        - "123456"

  configuration:
    docker:
      supported: true
      compose_required: false
      environment_variables:
        - name: "TZ"
          required: false
          secret: false
          description: "Time zone for logs and display."
          example: "Europe/Berlin"
          default: "Europe/Berlin"
        - name: "ISHIKU_APP_URL"
          required: false
          secret: false
          description: "Public app URL behind a reverse proxy; also used as an allowed origin."
          example: "https://pulliku.example.test"
          default: ""
        - name: "ISHIKU_ALLOWED_ORIGINS"
          required: false
          secret: false
          description: "Comma-separated additional allowed origins for HTTPS or reverse-proxy deployments."
          example: "https://pulliku.example.test"
          default: ""
        - name: "ISHIKU_BASE_PATH"
          required: false
          secret: false
          description: "Base path behind reverse proxy."
          example: "/"
          default: "/"
        - name: "ISHIKU_DATA_DIR"
          required: false
          secret: false
          description: "Persistent data directory in the container."
          example: "/data"
          default: "/data"
        - name: "DOWNLOAD_DIR"
          required: false
          secret: false
          description: "Download output directory in the container."
          example: "/downloads"
          default: "/downloads"
        - name: "ISHIKU_LOG_LEVEL"
          required: false
          secret: false
          description: "Application log level."
          example: "info"
          default: "info"
        - name: "ISHIKU_SETUP_SECRET_FILE"
          required: false
          secret: false
          description: "Path to setup secret file."
          example: "/run/secrets/ishiku_setup_secret"
          default: "/run/secrets/ishiku_setup_secret"
        - name: "ISHIKU_SETUP_SECRET"
          required: false
          secret: true
          description: "Clear-text setup secret fallback for simple private deployments."
          example: "replace-with-a-long-random-setup-secret"
          default: ""
        - name: "PULLIKU_FILE_RETENTION_DAYS"
          required: false
          secret: false
          description: "Automatic retention period for completed files unless marked permanent."
          example: "7"
          default: "7"
        - name: "PULLIKU_CLEANUP_INTERVAL_SECONDS"
          required: false
          secret: false
          description: "Interval between automatic cleanup checks."
          example: "3600"
          default: "3600"
        - name: "APP_COOKIE_SECURE"
          required: false
          secret: false
          description: "Enable secure cookies and HSTS for HTTPS deployments."
          example: "true"
          default: "false"
        - name: "APP_COOKIE_SAMESITE"
          required: false
          secret: false
          description: "Cookie SameSite mode."
          example: "strict"
          default: "strict"
        - name: "SESSION_DAYS"
          required: false
          secret: false
          description: "Session lifetime in days."
          example: "14"
          default: "14"
      secrets:
        - name: "ishiku_setup_secret"
          required: false
          description: "Optional Docker secret file for initial admin registration."
      volumes:
        - name: "data"
          path: "/data"
          required: true
          purpose: "SQLite database and persistent app data."
        - name: "downloads"
          path: "/downloads"
          required: true
          purpose: "Downloaded media files."
        - name: "secrets"
          path: "/run/secrets"
          required: false
          purpose: "Optional setup secret file mount."
      ports:
        - container: 8080
          host_default: 8180
          protocol: "tcp"
    app_settings:
      - key: "theme"
        type: "enum"
        default: "lavender"
        user_editable: true
        stored_in: "browser_local_storage"
      - key: "mode"
        type: "enum"
        default: "system"
        user_editable: true
        stored_in: "browser_local_storage"

  architecture:
    frontend:
      framework: "vanilla_javascript"
      source_directory: "repo/app/static"
      routes:
        - path: "/"
          name: "home"
          purpose: "Main authenticated download dashboard."
          auth_required: true
        - path: "/setup"
          name: "setup"
          purpose: "First-run setup view."
          auth_required: false
        - path: "/login"
          name: "login"
          purpose: "Login view."
          auth_required: false
        - path: "/admin"
          name: "admin"
          purpose: "Admin route mapped to app shell."
          auth_required: true
    backend:
      framework: "FastAPI"
      source_file: "repo/app/main.py"
      api_base_path: "/api"
      endpoints:
        - method: "GET"
          path: "/healthz"
          purpose: "Liveness probe."
          auth_required: false
          request_schema: null
          response_schema: "plain_text_ok"
          errors: []
        - method: "GET"
          path: "/readyz"
          purpose: "Readiness probe."
          auth_required: false
          request_schema: null
          response_schema: "plain_text_ok"
          errors:
            - status: 503
              reason: "Database unavailable."
        - method: "GET"
          path: "/api/health"
          purpose: "Health, version, diagnostics, paths, and tool availability."
          auth_required: false
          request_schema: null
          response_schema: "health_object"
          errors: []
        - method: "GET"
          path: "/api/setup/status"
          purpose: "Returns whether setup is required and configured."
          auth_required: false
          request_schema: null
          response_schema: "setup_status_object"
          errors: []
        - method: "POST"
          path: "/api/setup/register"
          purpose: "Creates the first admin account."
          auth_required: false
          request_schema: "SetupRegisterPayload"
          response_schema: "user_object"
          errors:
            - status: 400
              reason: "Setup already completed, invalid setup secret, invalid password, or password mismatch."
        - method: "POST"
          path: "/api/login"
          purpose: "Creates authenticated session."
          auth_required: false
          request_schema: "LoginPayload"
          response_schema: "user_object"
          errors:
            - status: 401
              reason: "Invalid credentials."
            - status: 429
              reason: "Too many failed login attempts."
        - method: "POST"
          path: "/api/logout"
          purpose: "Clears session and CSRF cookies."
          auth_required: false
          request_schema: null
          response_schema: "status_object"
          errors: []
        - method: "GET"
          path: "/api/me"
          purpose: "Returns current authenticated user."
          auth_required: true
          request_schema: null
          response_schema: "user_object"
          errors:
            - status: 401
              reason: "Not authenticated."
        - method: "GET"
          path: "/api/downloads"
          purpose: "Lists current user's downloads."
          auth_required: true
          request_schema: null
          response_schema: "downloads_list"
          errors:
            - status: 401
              reason: "Not authenticated."
        - method: "POST"
          path: "/api/downloads"
          purpose: "Queues a new download."
          auth_required: true
          request_schema: "DownloadPayload"
          response_schema: "download_object"
          errors:
            - status: 422
              reason: "Payload validation failed."
        - method: "POST"
          path: "/api/downloads/{download_id}/cancel"
          purpose: "Cancels queued or running download."
          auth_required: true
          request_schema: null
          response_schema: "status_object"
          errors:
            - status: 404
              reason: "Download not found."
        - method: "POST"
          path: "/api/downloads/{download_id}/permanent"
          purpose: "Toggles permanent retention for a completed file."
          auth_required: true
          request_schema: "PermanentPayload"
          response_schema: "download_object"
          errors:
            - status: 404
              reason: "Download not found."
        - method: "DELETE"
          path: "/api/downloads/{download_id}"
          purpose: "Deletes a download record and local file when present."
          auth_required: true
          request_schema: null
          response_schema: "status_object"
          errors:
            - status: 404
              reason: "Download not found."
            - status: 409
              reason: "Cannot delete running download."
        - method: "GET"
          path: "/api/files"
          purpose: "Lists completed files for current user."
          auth_required: true
          request_schema: null
          response_schema: "files_list"
          errors:
            - status: 401
              reason: "Not authenticated."
        - method: "GET"
          path: "/api/downloads/{download_id}/file"
          purpose: "Downloads a completed file as an attachment."
          auth_required: true
          request_schema: null
          response_schema: "file_response_attachment"
          errors:
            - status: 404
              reason: "File not found."
        - method: "GET"
          path: "/api/downloads/{download_id}/open"
          purpose: "Opens a completed file inline from the server."
          auth_required: true
          request_schema: null
          response_schema: "file_response_inline"
          errors:
            - status: 404
              reason: "File not found."
        - method: "GET"
          path: "/api/admin/users"
          purpose: "Lists local users."
          auth_required: true
          request_schema: null
          response_schema: "users_list"
          errors:
            - status: 403
              reason: "Admin required."
        - method: "POST"
          path: "/api/admin/users"
          purpose: "Creates a local user."
          auth_required: true
          request_schema: "UserCreatePayload"
          response_schema: "user_object"
          errors:
            - status: 403
              reason: "Admin required."
        - method: "PUT"
          path: "/api/admin/users/{user_id}/password"
          purpose: "Updates a local user's password."
          auth_required: true
          request_schema: "PasswordPayload"
          response_schema: "status_object"
          errors:
            - status: 403
              reason: "Admin required."
        - method: "DELETE"
          path: "/api/admin/users/{user_id}"
          purpose: "Deletes a local user."
          auth_required: true
          request_schema: null
          response_schema: "status_object"
          errors:
            - status: 400
              reason: "Cannot delete own account."
            - status: 403
              reason: "Admin required."
    storage:
      type: "filesystem_and_sqlite"
      files:
        - path: "/downloads"
          purpose: "Completed media files and zip packages."
        - path: "/data/app.db"
          purpose: "SQLite database."
      database:
        engine: "sqlite"
        tables_or_collections:
          - name: "users"
            purpose: "Local user accounts."
          - name: "sessions"
            purpose: "Authenticated sessions and CSRF token hashes."
          - name: "downloads"
            purpose: "Download queue, status, metadata, file path, options, and retention state."
          - name: "setup_state"
            purpose: "Tracks first-run setup completion."
    external_services:
      - id: "media_source_sites"
        name: "Media source websites"
        required: true
        purpose: "Source URLs processed by yt-dlp."
        connection_type: "https"
        credentials_required: false
      - id: "ghcr"
        name: "GitHub Container Registry"
        required: false
        purpose: "Published Docker image distribution."
        connection_type: "oci_registry"
        credentials_required: true

  data_model:
    entities:
      - id: "user"
        name: "User"
        description: "Local account."
        fields:
          - name: "id"
            type: "integer"
            required: true
            unique: true
            sensitive: false
            description: "Primary key."
          - name: "username"
            type: "string"
            required: true
            unique: true
            sensitive: false
            description: "Login username."
          - name: "display_name"
            type: "string"
            required: false
            unique: false
            sensitive: false
            description: "Display name."
          - name: "email"
            type: "string"
            required: false
            unique: false
            sensitive: true
            description: "Optional email address."
          - name: "password_hash"
            type: "string"
            required: true
            unique: false
            sensitive: true
            description: "PBKDF2-SHA256 password hash."
          - name: "is_admin"
            type: "boolean"
            required: true
            unique: false
            sensitive: false
            description: "Admin role flag."
        relationships:
          - target_entity: "download"
            type: "one_to_many"
            description: "A user can create many downloads."
      - id: "download"
        name: "Download"
        description: "Queued, running, completed, failed, or cancelled download item."
        fields:
          - name: "id"
            type: "integer"
            required: true
            unique: true
            sensitive: false
            description: "Primary key."
          - name: "url"
            type: "string"
            required: true
            unique: false
            sensitive: false
            description: "Source media URL."
          - name: "status"
            type: "enum"
            required: true
            unique: false
            sensitive: false
            description: "queued, running, completed, failed, or cancelled."
          - name: "filename"
            type: "string"
            required: false
            unique: false
            sensitive: false
            description: "Relative path under DOWNLOAD_DIR."
          - name: "is_permanent"
            type: "boolean"
            required: true
            unique: false
            sensitive: false
            description: "Whether automatic retention cleanup should skip the file."
          - name: "settings_json"
            type: "json_string"
            required: true
            unique: false
            sensitive: false
            description: "Normalized download options."
        relationships:
          - target_entity: "user"
            type: "many_to_one"
            description: "Download belongs to its creator when created_by is set."
      - id: "session"
        name: "Session"
        description: "Authenticated browser session."
        fields:
          - name: "token_hash"
            type: "string"
            required: true
            unique: true
            sensitive: true
            description: "Hash of session token."
          - name: "csrf_token_hash"
            type: "string"
            required: false
            unique: false
            sensitive: true
            description: "Hash of CSRF token."
          - name: "expires_at"
            type: "datetime"
            required: true
            unique: false
            sensitive: false
            description: "Session expiration timestamp."
        relationships:
          - target_entity: "user"
            type: "many_to_one"
            description: "Session belongs to a user."

  workflows:
    - id: "first_start_setup"
      name: "First start setup"
      actor: "admin"
      trigger: "first_app_start"
      steps:
        - order: 1
          action: "open_app"
          result: "setup_registration_window_visible"
        - order: 2
          action: "enter_setup_secret_and_admin_credentials"
          result: "admin_registration_request_sent"
        - order: 3
          action: "submit_valid_setup"
          result: "admin_account_created"
      success_result: "Admin can log in and public registration is closed."
      failure_result: "Setup remains visible with an error message."
    - id: "download_media"
      name: "Download media"
      actor: "local_user"
      trigger: "user_submits_media_url"
      steps:
        - order: 1
          action: "enter_url_and_options"
          result: "download_payload_ready"
        - order: 2
          action: "submit_download"
          result: "queue_item_created"
        - order: 3
          action: "background_worker_processes_item"
          result: "file_created_or_error_recorded"
      success_result: "Completed item exposes download, open, retention, and delete actions."
      failure_result: "Failed item shows error and can be deleted."
    - id: "manage_retention"
      name: "Manage retention"
      actor: "local_user"
      trigger: "completed_download_visible"
      steps:
        - order: 1
          action: "click_expiration_pill"
          result: "is_permanent_toggled"
        - order: 2
          action: "wait_for_cleanup_interval"
          result: "expired_non_permanent_files_deleted"
      success_result: "Permanent files remain; expired non-permanent files are removed."
      failure_result: "Filesystem errors skip deletion and require admin investigation."

  ui:
    design_system:
      name: "Pixel Soft Utility"
      source_file: "pixel_soft_utility_codex_pack_v4/"
      required: true
    responsive_targets:
      mobile:
        required: true
        style: "app_like"
      desktop:
        required: true
        style: "calm_dashboard"
    screens:
      - id: "setup"
        name: "Setup"
        route: "/setup"
        purpose: "First-run admin registration."
        components:
          - "setup_window"
          - "setup_secret_field"
          - "admin_credentials_form"
        primary_actions:
          - "create_admin_account"
        empty_states: []
        error_states:
          - "setup_secret_missing"
          - "invalid_setup_secret"
          - "password_validation_failed"
      - id: "login"
        name: "Login"
        route: "/login"
        purpose: "Authenticate local users."
        components:
          - "auth_window"
          - "username_field"
          - "password_field"
        primary_actions:
          - "sign_in"
        empty_states: []
        error_states:
          - "invalid_credentials"
          - "rate_limited"
      - id: "home"
        name: "Home"
        route: "/"
        purpose: "Single-view download dashboard."
        components:
          - "app_header"
          - "download_form"
          - "download_options_panel"
          - "queue_stats"
          - "download_cards"
          - "profile_sheet"
          - "about_section"
          - "admin_section"
        primary_actions:
          - "start_download"
          - "download_file"
          - "open_file"
          - "toggle_expiration"
          - "delete_file"
        empty_states:
          - "no_downloads"
        error_states:
          - "download_failed"
          - "request_failed"
    navigation:
      header:
        app_symbol: true
        app_name: true
        subtitle: false
        overflow_menu: true
        forbidden_items:
          - "version"
          - "build_date"
          - "github_sha"
          - "technical_status"
      menu:
        type: "profile_overflow"
        mobile_presentation: "bottom_sheet"
        desktop_presentation: "side_sheet_or_popover"
    settings_about_admin:
      appearance_settings: true
      about_section: true
      admin_info_section: true
      diagnostics_section: true
      logs_section: true

  theming:
    shared_theme_system: true
    themes:
      - "lavender"
      - "mint"
      - "sky"
      - "amber"
      - "rose"
      - "graphite"
    modes:
      - "system"
      - "light"
      - "dark"
    local_storage:
      theme_key_pattern: "{app_id}-theme"
      mode_key_pattern: "{app_id}-mode"
    hardcoded_app_accent_allowed: false

  security:
    local_first_assumption: true
    secrets_handling:
      docker_secrets_supported: true
      clear_env_setup_secret_supported: true
      never_expose_secrets_in_ui: true
      never_log_secrets: true
    sensitive_data:
      - name: "password_hash"
        storage_location: "sqlite users.password_hash"
        protection: "PBKDF2-SHA256 with per-password salt."
      - name: "session_token"
        storage_location: "browser cookie and sqlite sessions.token_hash"
        protection: "Only hash stored server-side; cookie can be HttpOnly and Secure."
      - name: "csrf_token"
        storage_location: "browser cookie and sqlite sessions.csrf_token_hash"
        protection: "Only hash stored server-side; required for unsafe requests."
      - name: "setup_secret"
        storage_location: "environment variable or Docker secret file"
        protection: "Compared with constant-time hmac.compare_digest; not shown in UI."
    access_control:
      admin_only_features:
        - "list_users"
        - "create_user"
        - "reset_user_password"
        - "delete_user"
      user_scoped_features:
        - "downloads"
        - "files"
        - "file_download"
        - "file_open"
    audit_or_logs:
      enabled: false
      log_sensitive_values: false

  errors_and_diagnostics:
    user_visible_errors:
      - id: "download_failed"
        condition: "yt-dlp or post-processing exits with an error."
        message: "Download error text from backend."
        recovery_action: "Check URL, network, format options, and diagnostics."
      - id: "file_not_found"
        condition: "Completed file is missing, expired, deleted, or outside DOWNLOAD_DIR."
        message: "File not found"
        recovery_action: "Re-download the item if needed."
      - id: "cross_origin_rejected"
        condition: "Request Origin does not match host or configured allowed origins."
        message: "Cross-Origin request rejected"
        recovery_action: "Configure ISHIKU_APP_URL or ISHIKU_ALLOWED_ORIGINS for the published HTTPS origin."
    admin_diagnostics:
      - id: "health"
        name: "Health"
        purpose: "Show version, build SHA, data paths, database status, and tool versions."
      - id: "public_ip"
        name: "Public IP"
        purpose: "Expose current outbound public IP for troubleshooting source site behavior."
      - id: "tool_versions"
        name: "Tool versions"
        purpose: "Show yt-dlp, ffmpeg, Deno, and yt-dlp-ejs availability."
    logs:
      available_in_ui: false
      location: "docker_logs"
      downloadable: false

  readme_contract:
    required_sections:
      - "app_summary"
      - "features"
      - "installation"
      - "docker_compose"
      - "configuration"
      - "first_start_setup"
      - "part_of_ishiku_family"
      - "created_with_chatgpt_codex"
      - "license"
    source_of_truth: "app_spec.yaml"

  implementation_constraints:
    must:
      - "follow_app_spec_yaml"
      - "follow_pixel_soft_utility_design_system"
      - "use_accessible_controls"
      - "keep_technical_info_out_of_header"
      - "support_local_theme_persistence"
      - "keep_app_code_inside_repo_directory"
      - "keep_repository_metadata_in_root_directory"
      - "delete_local_file_when_download_item_is_deleted"
    must_not:
      - "invent_unlisted_core_features"
      - "hardcode_app_specific_accent_color"
      - "place_build_info_in_main_footer"
      - "place_admin_status_in_header"
      - "store_downloads_outside_configured_download_dir"

  acceptance_criteria:
    - id: "spec_valid_yaml"
      description: "app_spec.yaml is syntactically valid YAML."
      testable: true
      status: "implemented"
    - id: "first_admin_setup"
      description: "Fresh deployment requires setup secret and creates the first admin account."
      testable: true
      status: "implemented"
    - id: "download_queue"
      description: "Authenticated user can queue and monitor downloads."
      testable: true
      status: "implemented"
    - id: "manual_delete_removes_file"
      description: "Deleting a download item removes its local file when present."
      testable: true
      status: "implemented"
    - id: "retention_cleanup"
      description: "Non-permanent completed files expire after the configured retention period."
      testable: true
      status: "implemented"
    - id: "permanent_toggle"
      description: "Completed files can be marked as no expiration/permanent through the UI."
      testable: true
      status: "implemented"
    - id: "inline_open"
      description: "Completed files have an inline open action in addition to download."
      testable: true
      status: "implemented"
    - id: "root_repository_structure"
      description: "Repository root contains project metadata while app code lives under repo/."
      testable: true
      status: "implemented"

  open_questions:
    - id: "license"
      question: "Which license should the repository declare?"
      impact: "README and package metadata cannot make a precise license claim."
      default_assumption: "not_specified"
    - id: "logs_ui"
      question: "Should server logs be exposed or downloadable from the UI?"
      impact: "Current UI points users to Docker logs instead of exposing logs directly."
      default_assumption: false
    - id: "root_logo_asset"
      question: "Should the canonical logo also be stored in the repository root outside repo/app/static?"
      impact: "Current app logo is stored in repo/app/static/pulliku-logo.png."
      default_assumption: "keep_runtime_logo_in_app_static"

  assumptions:
    - id: "private_deployment"
      assumption: "Pulliku is primarily used in private, self-hosted, local-first deployments."
      reason: "Authentication, setup secret flow, Docker Compose examples, and README describe private/small deployments."
      needs_confirmation: false
    - id: "root_metadata_is_tracked"
      assumption: "Root-level metadata such as app_spec.yaml and the Pixel Soft Utility pack should be tracked in GitHub."
      reason: "User stated that the root folder is for basic project information that should go to GitHub."
      needs_confirmation: false
