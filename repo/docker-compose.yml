name: pulliku
services:
  pulliku:
    image: ghcr.io/maroishiku/pulliku:latest
    container_name: pulliku
    restart: unless-stopped
    ports:
      - target: 8080
        published: "8180"
        protocol: tcp
    environment:
      TZ: Europe/Berlin
      ISHIKU_APP_URL: http://localhost:8180
      ISHIKU_ALLOWED_ORIGINS: ""
      ISHIKU_BASE_PATH: /
      ISHIKU_DATA_DIR: /data
      DOWNLOAD_DIR: /downloads
      ISHIKU_SETUP_SECRET_FILE: ""
      ISHIKU_SETUP_SECRET: "replace-with-a-long-random-setup-secret"
      ISHIKU_LOG_LEVEL: info
      PULLIKU_FILE_RETENTION_DAYS: 7
      PULLIKU_CLEANUP_INTERVAL_SECONDS: 3600
      SESSION_DAYS: 14
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/pulliku/data
        target: /data
      - type: bind
        source: /media/ZimaOS-HD/AppData/pulliku/downloads
        target: /downloads
    network_mode: bridge
    privileged: false
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      icon: https://raw.githubusercontent.com/MaroIshiku/pulliku/main/app/static/pulliku-logo.png
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://raw.githubusercontent.com/MaroIshiku/pulliku/main/app/static/pulliku-logo.png
  index: /
  is_uncontrolled: false
  port_map: "8180"
  scheme: http
  store_app_id: pulliku
  title:
    custom: Pulliku
    en_us: Pulliku
